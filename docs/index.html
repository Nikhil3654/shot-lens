<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shot Lens</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  </head>
  <body>
    <header>
      <div>
        <p class="eyebrow">NBA Player Evaluation Lab</p>
        <h1>Shot Lens</h1>
        <p>Compare scoring value, shot quality, player trends, similarity, and next-season projections.</p>
      </div>
      <nav>
        <button data-view="versus" class="active">Player Compare</button>
        <button data-view="league">League Rankings</button>
        <button data-view="trends">Player Trends</button>
        <button data-view="projection">Projection</button>
        <button data-view="similarity">Similarity Lab</button>
        <button data-view="calibration">Calibration</button>
        <button data-view="player">Shot Detail</button>
        <button data-view="models">Models</button>
      </nav>
    </header>

    <main>
      <section id="controls"></section>
      <section id="summary" class="metrics"></section>
      <section id="content"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
